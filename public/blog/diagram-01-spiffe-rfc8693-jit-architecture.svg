<svg xmlns="http://www.w3.org/2000/svg" width="800" height="980" viewBox="0 0 800 980" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-size: 12px; font-weight: 600; fill: #1e293b; }
      .ts { font-size: 10.5px; fill: #475569; }
      .label { font-size: 10px; fill: #64748b; }
      .phase { font-size: 10px; fill: #94a3b8; }
      .green { fill: #1D9E75; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="980" fill="#f8fafc" rx="12"/>
  <rect x="16" y="16" width="768" height="948" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Secretless Service-to-Service Authentication</text>
  <text x="400" y="62" text-anchor="middle" font-size="11" fill="#64748b">SPIFFE / RFC 8693 / JIT Delegation — Combined Architecture</text>

  <!-- Column headers -->
  <!-- AI Agent -->
  <rect x="46" y="82" width="140" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="116" y="103" text-anchor="middle" class="th">AI Agent</text>
  <text x="116" y="120" text-anchor="middle" class="ts">Workload A</text>

  <!-- SPIRE Server -->
  <rect x="226" y="82" width="140" height="52" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="1"/>
  <text x="296" y="103" text-anchor="middle" class="th">SPIRE Server</text>
  <text x="296" y="120" text-anchor="middle" class="ts">Attestation + SVID</text>

  <!-- Auth Server -->
  <rect x="406" y="82" width="140" height="52" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="476" y="103" text-anchor="middle" class="th">Auth Server</text>
  <text x="476" y="120" text-anchor="middle" class="ts">Okta / Aembit / STS</text>

  <!-- Downstream API -->
  <rect x="586" y="82" width="140" height="52" rx="8" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
  <text x="656" y="103" text-anchor="middle" class="th">Downstream API</text>
  <text x="656" y="120" text-anchor="middle" class="ts">Payment / database</text>

  <!-- Lifelines -->
  <line x1="116" y1="134" x2="116" y2="890" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="296" y1="134" x2="296" y2="890" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="476" y1="134" x2="476" y2="890" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="656" y1="134" x2="656" y2="890" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="4 4"/>

  <!-- ═══ Phase 1: SPIFFE Attestation ═══ -->
  <rect x="46" y="154" width="680" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="386" y="165" text-anchor="middle" class="phase">Phase 1 — SPIFFE Workload Attestation  (The "Who")</text>

  <!-- 1. Request SVID -->
  <line x1="116" y1="196" x2="286" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="201" y="188" text-anchor="middle" class="ts">1. Request JWT-SVID</text>
  <text x="201" y="203" text-anchor="middle" class="label">(Unix domain socket)</text>

  <!-- 2. Attestation check box -->
  <rect x="246" y="214" width="100" height="38" rx="6" fill="#CCFBF1" stroke="#0D9488" stroke-width="0.8"/>
  <text x="296" y="228" text-anchor="middle" class="ts">Attest workload</text>
  <text x="296" y="243" text-anchor="middle" class="label">K8s namespace / pod</text>

  <!-- 3. Issue SVID -->
  <line x1="286" y1="262" x2="126" y2="262" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="201" y="254" text-anchor="middle" class="ts green">2. JWT-SVID issued</text>
  <text x="201" y="269" text-anchor="middle" class="label">spiffe://domain/agent · 5 min TTL</text>

  <!-- ═══ Phase 2: RFC 8693 ═══ -->
  <rect x="46" y="292" width="680" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="386" y="303" text-anchor="middle" class="phase">Phase 2 — RFC 8693 Token Exchange  (The "How")</text>

  <!-- 3. Token exchange request -->
  <line x1="116" y1="336" x2="466" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="291" y="328" text-anchor="middle" class="ts">3. Token exchange request</text>
  <text x="291" y="343" text-anchor="middle" class="label">subject_token=JWT-SVID · actor=agent-001</text>

  <!-- 4. Validate SVID box -->
  <rect x="426" y="354" width="100" height="38" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="0.8"/>
  <text x="476" y="368" text-anchor="middle" class="ts">Validate SVID</text>
  <text x="476" y="383" text-anchor="middle" class="label">vs. SPIRE trust bundle</text>

  <!-- 5. OBO token returned -->
  <line x1="466" y1="402" x2="126" y2="402" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="291" y="394" text-anchor="middle" class="ts green">4. OBO access token returned</text>
  <text x="291" y="409" text-anchor="middle" class="label">scope=narrow · act.sub=agent-001 · aud=payment-api</text>

  <!-- OBO token anatomy box -->
  <rect x="196" y="424" width="510" height="68" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="208" y="440" class="label">OBO token claims</text>
  <text x="208" y="456" class="ts">sub: user-7821</text>
  <text x="368" y="456" class="ts">act.sub: agent-001</text>
  <text x="528" y="456" class="ts">scope: read:txn</text>
  <text x="208" y="474" class="ts">aud: payment-api</text>
  <text x="368" y="474" class="ts">exp: now + 5 min</text>
  <text x="528" y="474" class="ts">jti: &lt;unique nonce&gt;</text>

  <!-- ═══ Phase 3: JIT Delegation ═══ -->
  <rect x="46" y="506" width="680" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="386" y="517" text-anchor="middle" class="phase">Phase 3 — JIT Delegation  (The "When")</text>

  <!-- 5. API call -->
  <line x1="116" y1="550" x2="646" y2="550" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="386" y="542" text-anchor="middle" class="ts">5. API call with OBO token</text>
  <text x="386" y="557" text-anchor="middle" class="label">Authorization: Bearer &lt;OBO token&gt;</text>

  <!-- Validate box downstream -->
  <rect x="606" y="568" width="100" height="30" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="656" y="587" text-anchor="middle" class="ts">Validate + serve</text>

  <!-- 6. Scoped response -->
  <line x1="646" y1="608" x2="126" y2="608" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="386" y="600" text-anchor="middle" class="ts green">6. Scoped response returned</text>

  <!-- ═══ Re-attestation loop ═══ -->
  <rect x="46" y="632" width="680" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="386" y="643" text-anchor="middle" class="phase">Token Expiry — Zero-Trust Re-attestation Loop</text>

  <!-- Token expires box -->
  <rect x="66" y="666" width="100" height="30" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="116" y="685" text-anchor="middle" class="ts">Token expires</text>

  <!-- Loop arrow back up via left margin -->
  <path d="M116 696 L116 730 L30 730 L30 196 L106 196" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="20" y="460" text-anchor="middle" class="label" transform="rotate(-90,20,460)">re-attest loop</text>

  <!-- ═══ Key security properties box ═══ -->
  <rect x="46" y="754" width="680" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="66" y="776" class="th">Key security properties</text>
  <text x="66" y="798" class="ts">No static secrets — every credential is short-lived and cryptographically attested</text>
  <text x="66" y="816" class="ts">Minimal blast radius — OBO token is scoped to one audience, one action, one TTL</text>
  <text x="66" y="834" class="ts">Full delegation chain — JWT act claim preserves agent-001 acting on behalf of user-7821</text>
  <text x="66" y="852" class="ts">Replay prevention — jti nonce + short TTL makes stolen tokens non-reusable</text>

</svg>
