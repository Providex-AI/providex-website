<svg xmlns="http://www.w3.org/2000/svg" width="800" height="980" viewBox="0 0 800 980" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-size: 12px; font-weight: 600; fill: #1e293b; }
      .ts { font-size: 10.5px; fill: #475569; }
      .label { font-size: 10px; fill: #94a3b8; }
      .phase { font-size: 10px; fill: #94a3b8; }
      .field { font-size: 10px; fill: #334155; }
      .green { fill: #1D9E75; }
      .red { fill: #DC2626; }
      .amber { fill: #D97706; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="980" fill="#f8fafc" rx="12"/>
  <rect x="16" y="16" width="768" height="948" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Providex AI — Triad of Trust</text>
  <text x="400" y="62" text-anchor="middle" font-size="11" fill="#64748b">Identity Layer assembles Context Object → Policy Layer evaluates → Immutable audit record</text>

  <!-- ═══ Layer 1: Provenance Attestation ═══ -->
  <rect x="46" y="82" width="708" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="400" y="93" text-anchor="middle" class="phase">Layer 1 — Provenance Attestation</text>

  <!-- SPIRE SVID -->
  <rect x="58" y="116" width="160" height="52" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="1"/>
  <text x="138" y="137" text-anchor="middle" class="th">SPIRE SVID</text>
  <text x="138" y="154" text-anchor="middle" class="ts">Client-issued at runtime</text>

  <!-- Agent Registry -->
  <rect x="240" y="116" width="160" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="320" y="137" text-anchor="middle" class="th">Agent Registry</text>
  <text x="320" y="154" text-anchor="middle" class="ts">Providex-managed</text>

  <!-- Provenance Hash -->
  <rect x="422" y="116" width="160" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="502" y="137" text-anchor="middle" class="th">Provenance Hash</text>
  <text x="502" y="154" text-anchor="middle" class="ts">Anchors agent baseline</text>

  <!-- Converging arrows down -->
  <line x1="138" y1="168" x2="300" y2="196" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="168" x2="320" y2="196" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="502" y1="168" x2="340" y2="196" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Attestation check -->
  <rect x="210" y="196" width="220" height="44" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="1"/>
  <text x="320" y="213" text-anchor="middle" class="th">Attestation Check</text>
  <text x="320" y="229" text-anchor="middle" class="ts">SVID matched to registered agent record</text>

  <!-- ═══ Layer 2: OBO Identity Binding ═══ -->
  <rect x="46" y="260" width="708" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="400" y="271" text-anchor="middle" class="phase">Layer 2 — On-Behalf-Of Identity Binding</text>

  <line x1="320" y1="240" x2="320" y2="260" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- OBO Token box -->
  <rect x="58" y="294" width="684" height="76" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="400" y="316" text-anchor="middle" class="th">OBO Token — RFC 8693 (act claim)</text>
  <!-- Row 1 -->
  <text x="80" y="336" class="field">sub: user-7821</text>
  <text x="270" y="336" class="field">act.sub: agent-001</text>
  <text x="490" y="336" class="field">session_id: sess-xyz</text>
  <!-- Row 2 -->
  <text x="80" y="356" class="field">scope: read:txn</text>
  <text x="270" y="356" class="field">aud: payment-api</text>
  <text x="490" y="356" class="field">exp: now + 5 min</text>

  <!-- ═══ Context Object Assembly ═══ -->
  <line x1="400" y1="370" x2="400" y2="396" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="46" y="396" width="708" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="400" y="407" text-anchor="middle" class="phase">Context Object Assembly — Identity Layer Output (signed, tamper-evident)</text>

  <!-- Context Object block -->
  <rect x="58" y="430" width="684" height="170" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Context Object</text>

  <!-- Column 1 -->
  <text x="80" y="474" class="field">agent_id</text>
  <text x="80" y="492" class="field">agent_spiffe_id</text>
  <text x="80" y="510" class="field">model_version</text>
  <text x="80" y="528" class="field">risk_classification</text>
  <text x="80" y="546" class="field">provenance_hash</text>

  <!-- Column 2 -->
  <text x="290" y="474" class="field">principal_id  (sub)</text>
  <text x="290" y="492" class="field">acting_agent  (act.sub)</text>
  <text x="290" y="510" class="field">session_id</text>
  <text x="290" y="528" class="field">delegation_chain</text>
  <text x="290" y="546" class="field">environment</text>

  <!-- Column 3 -->
  <text x="510" y="474" class="field">action / tool_name</text>
  <text x="510" y="492" class="field">resource</text>
  <text x="510" y="510" class="field">regulatory_category</text>
  <text x="510" y="528" class="field">request_id</text>
  <text x="510" y="546" class="field">timestamp</text>

  <!-- Footer -->
  <text x="400" y="582" text-anchor="middle" class="label">Assembled and signed by Identity Layer — not by the application, agent, or user</text>

  <!-- ═══ Layer 3: Policy Evaluation ═══ -->
  <line x1="400" y1="600" x2="400" y2="626" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="46" y="626" width="708" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="400" y="637" text-anchor="middle" class="phase">Layer 3 — Policy-as-Code Evaluation  (OPA / Cedar)</text>

  <!-- Policy engine -->
  <rect x="250" y="662" width="300" height="44" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="400" y="679" text-anchor="middle" class="th">Policy Engine</text>
  <text x="400" y="695" text-anchor="middle" class="ts">Evaluates full Context Object</text>

  <!-- Three outcome arrows -->
  <line x1="290" y1="706" x2="138" y2="748" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="400" y1="706" x2="400" y2="748" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="510" y1="706" x2="622" y2="748" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Permit -->
  <rect x="58" y="748" width="160" height="52" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="138" y="769" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Permit</text>
  <text x="138" y="786" text-anchor="middle" class="ts">Tool executes</text>

  <!-- Deny -->
  <rect x="320" y="748" width="160" height="52" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="400" y="769" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">Deny</text>
  <text x="400" y="786" text-anchor="middle" class="ts">Blocked + reason returned</text>

  <!-- Obligation -->
  <rect x="540" y="748" width="160" height="52" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="620" y="769" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">Obligation</text>
  <text x="620" y="786" text-anchor="middle" class="ts">Conditional — HITL approval</text>

  <!-- Converge to audit log -->
  <line x1="138" y1="800" x2="360" y2="844" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="800" x2="400" y2="844" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="800" x2="440" y2="844" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Audit record -->
  <rect x="220" y="844" width="360" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="865" text-anchor="middle" class="th">Immutable Audit Record</text>
  <text x="400" y="882" text-anchor="middle" class="ts">Context Object + outcome + policy version + timestamp</text>

</svg>
